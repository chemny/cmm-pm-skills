<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sayit 可点击原型 V1</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; }
  body { background:#eceef1; color:#222; padding:16px; }
  .nav { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .nav b { width:100%; font-size:13px; color:#666; margin-bottom:2px; }
  .nav button { padding:6px 11px; border:1px solid #c8ccd2; background:#fff; border-radius:6px; cursor:pointer; font-size:13px; }
  .nav button:hover { border-color:#888; }
  .nav button.on { background:#3b5bdb; color:#fff; border-color:#3b5bdb; }
  .hint { font-size:12px; color:#888; margin-bottom:10px; }

  /* 模拟桌面 */
  .desktop { position:relative; height:520px; background:#dfe3e8 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"/>'); border:1px solid #c8ccd2; border-radius:10px; overflow:hidden; }
  .topbar { height:26px; background:#cfd4da; display:flex; align-items:center; padding:0 10px; gap:6px; }
  .dot { width:10px; height:10px; border-radius:50%; } .r{background:#e25b5b}.y{background:#e2b35b}.g{background:#5bbf6a}

  /* 邮件窗口 */
  .app { position:absolute; top:60px; left:60px; width:560px; background:#fff; border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,.18); overflow:hidden; }
  .app .bar { background:#f4f5f7; padding:10px 14px; font-size:13px; color:#555; border-bottom:1px solid #eef0f2; }
  .app .row { padding:8px 14px; border-bottom:1px solid #f1f2f4; font-size:13px; color:#777; }
  .app .body { padding:14px; min-height:170px; font-size:14px; line-height:1.7; color:#222; white-space:pre-wrap; }
  .caret { display:inline-block; width:1px; height:16px; background:#3b5bdb; vertical-align:-3px; animation:blink 1s step-end infinite; }
  @keyframes blink { 50%{opacity:0} }
  .badge { display:none; margin-left:6px; font-size:11px; padding:1px 7px; border-radius:10px; vertical-align:2px; }
  .badge.show { display:inline-block; }
  .b-raw{ background:#eceef1; color:#555 } .b-polish{ background:#e7edff; color:#3b5bdb } .b-gen{ background:#efe7ff; color:#7048c0 }

  /* sayit 浮窗 */
  .widget { position:absolute; right:30px; bottom:30px; width:300px; background:#fff; border-radius:14px; box-shadow:0 10px 34px rgba(0,0,0,.22); padding:14px 16px; display:none; }
  .widget.show { display:block; }
  .w-head { display:flex; align-items:center; gap:8px; font-size:13px; color:#666; margin-bottom:10px; }
  .w-logo { width:22px; height:22px; border-radius:6px; background:#3b5bdb; color:#fff; font-size:12px; display:flex; align-items:center; justify-content:center; font-weight:600; }
  .wave { display:flex; gap:3px; align-items:flex-end; height:26px; margin:6px 0 10px; }
  .wave i { width:4px; background:#3b5bdb; border-radius:2px; animation:wv 1s infinite ease-in-out; }
  .wave i:nth-child(2){animation-delay:.1s}.wave i:nth-child(3){animation-delay:.2s}.wave i:nth-child(4){animation-delay:.3s}.wave i:nth-child(5){animation-delay:.4s}.wave i:nth-child(6){animation-delay:.5s}
  @keyframes wv { 0%,100%{height:6px}50%{height:24px} }
  .live { font-size:14px; color:#222; min-height:40px; line-height:1.6; }
  .w-foot { font-size:12px; color:#aaa; margin-top:10px; }
  .spin { width:18px;height:18px;border:2px solid #dfe3e8;border-top-color:#3b5bdb;border-radius:50%;animation:sp .8s linear infinite;display:inline-block;vertical-align:-4px;margin-right:6px}
  @keyframes sp { to{transform:rotate(360deg)} }
  .err { color:#c0392b; font-size:13px; }
  .err button { margin-top:8px; padding:5px 10px; border:1px solid #c0392b; color:#c0392b; background:#fff; border-radius:6px; cursor:pointer; }

  /* 弹层(onboarding/设置/升级) */
  .modal { position:absolute; inset:0; background:rgba(20,22,28,.42); display:none; align-items:center; justify-content:center; }
  .modal.show { display:flex; }
  .card { width:430px; background:#fff; border-radius:14px; padding:22px; }
  .card h3 { font-size:17px; margin-bottom:4px; } .card p.sub{ color:#888; font-size:13px; margin-bottom:16px; }
  .step { display:flex; gap:10px; margin-bottom:12px; align-items:flex-start; }
  .step .n { width:22px;height:22px;border-radius:50%;background:#3b5bdb;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 22px;margin-top:1px }
  .step small { color:#888; }
  .field { display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid #f1f2f4; font-size:14px; }
  .field .v { color:#3b5bdb; font-size:13px; }
  .key { font-family:monospace; background:#f1f2f4; padding:2px 7px; border-radius:5px; font-size:12px; }
  .price { font-size:26px; font-weight:600; margin:8px 0; } .price small{font-size:13px;color:#888;font-weight:400}
  .primary { width:100%; padding:11px; background:#3b5bdb; color:#fff; border:none; border-radius:8px; font-size:14px; cursor:pointer; margin-top:14px; }
  .ghost { width:100%; padding:9px; background:#fff; color:#666; border:1px solid #d4d8de; border-radius:8px; font-size:13px; cursor:pointer; margin-top:8px; }
  .pill { display:inline-block; font-size:11px; background:#fff3e0; color:#b26a00; padding:2px 8px; border-radius:10px; margin-bottom:8px; }
  .trace { font-size:11px; color:#bbb; margin-top:10px; }
</style>
</head>
<body>

<div class="nav">
  <b>点这里切换 sayit 的各屏 / 各状态（对应界面规格 10-UI-Spec）：</b>
  <button onclick="show('rec')" id="t-rec">① 录音中</button>
  <button onclick="show('proc')" id="t-proc">② 处理中</button>
  <button onclick="show('raw')" id="t-raw">③ 插入·原话(短)</button>
  <button onclick="show('polish')" id="t-polish">④ 插入·已润色(中)</button>
  <button onclick="show('gen')" id="t-gen">⑤ 插入·已生成(指令)</button>
  <button onclick="show('err')" id="t-err">⑥ 无权限·错误</button>
  <button onclick="show('onb')" id="t-onb">⑦ Onboarding</button>
  <button onclick="show('set')" id="t-set">⑧ 设置</button>
  <button onclick="show('up')" id="t-up">⑨ 升级/限额</button>
</div>
<div class="hint">说明：低保真可点击原型，演示布局与流程；视觉终稿为后续设计。</div>

<div class="desktop">
  <div class="topbar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>

  <!-- 模拟邮件窗口 -->
  <div class="app">
    <div class="bar">✉️ 新邮件 — 写邮件</div>
    <div class="row">收件人：张三</div>
    <div class="row">主题：关于明天的会议</div>
    <div class="body"><span id="mailtext"></span><span class="caret"></span><span class="badge" id="badge"></span></div>
  </div>

  <!-- sayit 浮窗 -->
  <div class="widget" id="widget">
    <div class="w-head"><span class="w-logo">s</span><span id="w-title">sayit · 录音中</span></div>
    <div id="w-body"></div>
    <div class="w-foot" id="w-foot">再按一下快捷键 = 确定插入 ｜ Esc 取消</div>
    <div class="trace">追溯：PRD F1/F2/F3/F5</div>
  </div>

  <!-- 弹层 -->
  <div class="modal" id="modal"><div class="card" id="card"></div></div>
</div>

<script>
const mail = document.getElementById('mailtext');
const badge = document.getElementById('badge');
const widget = document.getElementById('widget');
const wTitle = document.getElementById('w-title');
const wBody = document.getElementById('w-body');
const wFoot = document.getElementById('w-foot');
const modal = document.getElementById('modal');
const card = document.getElementById('card');
const RAW = "嗯…那个我想跟你确认一下，就是明天下午三点那个会还开吗";

function setNav(id){ document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on')); const e=document.getElementById('t-'+id); if(e)e.classList.add('on'); }
function setMail(t, cls, label){ mail.textContent=t; badge.className='badge show '+cls; badge.textContent=label; }
function clearMail(){ mail.textContent=''; badge.className='badge'; }
function hideAll(){ widget.classList.remove('show'); modal.classList.remove('show'); }

function show(id){
  setNav(id); hideAll();
  if(id==='rec'){ clearMail(); widget.classList.add('show'); wTitle.textContent='sayit · 录音中';
    wBody.innerHTML='<div class="wave"><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="live">'+RAW+'</div>';
    wFoot.textContent='再按一下快捷键 = 确定插入 ｜ Esc 取消'; }
  else if(id==='proc'){ clearMail(); widget.classList.add('show'); wTitle.textContent='sayit · 处理中';
    wBody.innerHTML='<div class="live"><span class="spin"></span>判定中：原话 / 润色 / 生成…</div>'; wFoot.textContent='通常 <3 秒'; }
  else if(id==='raw'){ // 短内容→原话直插
    setMail("明天下午三点开会吗", "b-raw", "原话"); }
  else if(id==='polish'){ // 中等→轻润色
    setMail("想跟你确认一下，明天下午三点那个会还开吗？", "b-polish", "已润色"); }
  else if(id==='gen'){ // 有指令"写成邮件"→个性化生成
    setMail("张三你好：\n想和你确认下明天下午三点的会议是否照常进行，方便的话回复我一下，谢谢。", "b-gen", "已生成"); }
  else if(id==='err'){ clearMail(); widget.classList.add('show'); wTitle.textContent='sayit · 无法录音';
    wBody.innerHTML='<div class="err">麦克风未授权，无法语音输入。<br><button>去系统设置授权</button></div>'; wFoot.textContent=''; }
  else if(id==='onb'){ modal.classList.add('show'); card.innerHTML=
    '<h3>欢迎使用 sayit</h3><p class="sub">三步开始，让它越用越像你</p>'+
    '<div class="step"><span class="n">1</span><div>开启麦克风权限<br><small>用于语音输入</small></div></div>'+
    '<div class="step"><span class="n">2</span><div>设置唤起快捷键 <span class="key">长按 Ctrl</span><br><small>短按开始说，再短按插入</small></div></div>'+
    '<div class="step"><span class="n">3</span><div>导入 3–5 段你的历史邮件/文章<br><small>学出你的风格，首次就有点像你（数据存本地）</small></div></div>'+
    '<button class="primary" onclick="show(\'rec\')">完成，开始用</button>'+
    '<div class="trace">追溯：PRD F1/F4/F7</div>'; }
  else if(id==='set'){ modal.classList.add('show'); card.innerHTML=
    '<h3>设置</h3><p class="sub">sayit · 免费版</p>'+
    '<div class="field"><span>唤起快捷键</span><span class="v">长按 Ctrl ✎</span></div>'+
    '<div class="field"><span>润色阈值（超过则自动轻润色）</span><span class="v">50 字</span></div>'+
    '<div class="field"><span>自动轻润色</span><span class="v">开 ●</span></div>'+
    '<div class="field"><span>强制原话修饰键</span><span class="v">Shift + 确定</span></div>'+
    '<div class="field"><span>本周用量</span><span class="v">1,240 / 2,000 字</span></div>'+
    '<button class="primary" onclick="show(\'up\')">升级 Pro · 不限量 + 个性化深度</button>'+
    '<div class="trace">追溯：PRD F9/F8</div>'; }
  else if(id==='up'){ modal.classList.add('show'); card.innerHTML=
    '<span class="pill">本周 2000 字免费额度已用完</span>'+
    '<h3>升级 sayit Pro</h3><p class="sub">让它真正"懂你、像你、数据归你"</p>'+
    '<div class="price">¥25 <small>/ 月</small></div>'+
    '<div class="field"><span>✓ 不限字数</span></div>'+
    '<div class="field"><span>✓ 个性化成稿（深度学你的风格）</span></div>'+
    '<div class="field"><span>✓ 全部语音指令（写成邮件 / 正式点 / 按我风格）</span></div>'+
    '<div class="field"><span>✓ 风格数据本地加密</span></div>'+
    '<button class="primary">升级 Pro</button>'+
    '<button class="ghost" onclick="show(\'raw\')">暂不，继续用基础版</button>'+
    '<div class="trace">追溯：PRD F8（freemium）</div>'; }
}
show('rec');
</script>
</body>
</html>
